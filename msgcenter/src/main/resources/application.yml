
server:
  port: 8082
spring:
  application:
    name: @artifactId@
#  cloud:
#    nacos:
#      discovery:
#        server-addr: 127.0.0.1:8848
#        username: nacos
#        password: nacos
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 在最后添加了 &allowPublicKeyRetrieval=true
    # 数据库名（示例为 qin）
    url: jdbc:mysql://127.0.0.1:3306/qin?serverTimezone=GMT%2B8&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: 
    password: 
  redis:
    host: 
    port: 
    password: 
    database: 
    jedis:
      pool:
        max-active: 8 #最大连接数
  kafka:
    #以逗号分隔的主机：端口对列表，用于建立与Kafka的连接
    bootstrap-servers: 
    producer:
      # 发生错误后，消息重发的次数。
      retries: 0
      #当有多个消息需要被发送到同一个分区时，生产者会把它们放在同一个批次里。该参数指定了一个批次可以使用的内存大小，按照字节数计算。
      batch-size: 16384
      # 设置生产者内存缓冲区的大小。
      buffer-memory: 33554432
      # 键的序列化方式
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 值的序列化方式
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
    consumer:
      # 键的反序列化方式
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 值的反序列化方式
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis:
  mapper-locations: classpath:mapper/*.xml
  #开启驼峰命名
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


send-msg-conf:
  mysql-as-mq : true
  open-cache: true
  max-retry-count: 5
  email-host: smtp.qq.com
  email-port: 587
  #替换为自己的
  email-account: 
  #替换为自己的
  email-auth-code: 
  # 阿里云邮件推送（Direct Mail）SMTP：QQ 发送失败时回退；aliyun-email-host 留空则不回退
  aliyun-email-host: smtpdm.aliyun.com
  aliyun-email-port: "465"
  aliyun-email-account: ""
  aliyun-email-password: ""
